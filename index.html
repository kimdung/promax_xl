<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Ảnh Promax XL</title>

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #22c55e;
    --accent2: #3b82f6;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: radial-gradient(circle at top, #1f2937, #020617);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 380px;
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

h2 {
    margin: 0 0 10px;
    font-size: 20px;
}

.sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 10px;
    transition: 0.2s;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent2), #60a5fa);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-1px);
}

.btn-success {
    background: linear-gradient(135deg, var(--accent), #4ade80);
    color: black;
}

.btn-success:hover {
    transform: translateY(-1px);
}

.file-label {
    display: block;
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    border: 1px dashed #374151;
    cursor: pointer;
    margin-bottom: 15px;
    transition: 0.2s;
}

.file-label:hover {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.1);
}

.preview {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    border: 3px solid #1f2937;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.radar {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(rgba(34,197,94,0.5), transparent 60%);
    animation: sweep 1.5s linear infinite;
}

@keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.progress {
    height: 8px;
    background: #1f2937;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #4ade80);
    transition: width 0.2s;
}

.status {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
}

.percent {
    text-align: center;
    margin-top: 6px;
    font-size: 12px;
}

</style>
</head>

<body>

<div class="container">
<h2>🚀 Upload ảnh Promax XL</h2>

<div id="bleWarning" style="
    display:none;
    background:#7f1d1d;
    color:#fecaca;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:15px;
">
❌ Trình duyệt không hỗ trợ Bluetooth.<br>
Vui lòng dùng <b>Google Chrome</b> trên máy tính hoặc điện thoại Android.<br>
Hoặc ứng dụng <a href="https://apps.apple.com/us/app/bluefy-web-ble-browser/id1492822055"><b>Bluefy</b></a> trên iPhone
</div>


<div class="sub">
Trên Promax XL vào <b>Cài đặt → Ảnh khởi động</b><br>
hoặc <b>Cài đặt → Ảnh mặt đồng hồ</b><br>
Sau đó bấm lần lượt <b>1 → 2 → 3</b>
</div>

<button class="btn btn-primary" onclick="connect()">(1) Kết nối</button>

<input type="file" id="fileInput" accept="image/jpeg" hidden>
<label for="fileInput" class="file-label">(2) Chọn ảnh (360x360, &lt;512KB)</label>

<div id="preview" class="preview"></div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>
<div id="percent" class="percent">0%</div>
<div id="status" class="status">Chưa kết nối</div>

<button class="btn btn-success" onclick="sendImage()">(3) Gửi ảnh</button>

</div>

<script>

window.addEventListener("load", () => {
    if (!navigator.bluetooth) {
        const warn = document.getElementById("bleWarning");
        warn.style.display = "block";

        // disable toàn bộ nút
        document.querySelectorAll("button").forEach(btn => {
            btn.disabled = true;
            btn.style.opacity = "0.5";
            btn.style.cursor = "not-allowed";
        });

        document.querySelector(".file-label").style.pointerEvents = "none";
        document.querySelector(".file-label").style.opacity = "0.5";

        document.getElementById("status").innerText = "Trình duyệt không hỗ trợ BLE ❌";
    }
});



let device, characteristic;
let fileBuffer = null;

const SERVICE_UUID = '0000fff0-0000-1000-8000-00805f9b34fb';
const WRITE_UUID   = '0000fff1-0000-1000-8000-00805f9b34fb';

const bar = document.getElementById("bar");
const percentText = document.getElementById("percent");
const statusDiv = document.getElementById("status");
const preview = document.getElementById("preview");

function resetUI(msg = "Disconnected") {
    bar.style.width = "0%";
    percentText.innerText = "0%";
    preview.innerHTML = "";
    fileBuffer = null;
    statusDiv.innerText = msg;
    device = null;
    characteristic = null;
}

async function getServiceWithRetry(server, uuid, retry = 3) {
    for (let i = 0; i < retry; i++) {
        try {
            const service = await server.getPrimaryService(uuid);
            return service;
        } catch (e) {
            console.warn("Retry get service...", i);
            await delay(300);
        }
    }
    throw new Error("Service not found after retry");
}

async function connect() {
    try {
        console.log("🔍 Requesting device...");

        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Promax XL" }],
            optionalServices: [SERVICE_UUID]
        });

        console.log("✅ Device selected:", device.name, device.id);

        device.addEventListener('gattserverdisconnected', () => {
            console.warn("⚠️ Device disconnected");
            resetUI("Disconnected ❌");
        });

        await delay(300); // thêm trước connect

        console.log("🔌 Connecting to GATT...");
        const server = await device.gatt.connect();
        console.log("✅ GATT connected");

        console.log("📡 Getting service:", SERVICE_UUID);
        // const service = await server.getPrimaryService(SERVICE_UUID);
        
        const service = await getServiceWithRetry(server, SERVICE_UUID);
        // services.forEach(s => console.log(s.uuid));
        // console.log("✅ Service OK");

        console.log("✍️ Getting characteristic:", WRITE_UUID);
        characteristic = await service.getCharacteristic(WRITE_UUID);
        console.log("✅ Characteristic OK");

        statusDiv.innerText = "Connected ✅";

    } catch (e) {
        console.error("❌ Connect error:", e);

        let msg = "Connect failed ❌";

        if (e.name === "NotFoundError") {
            msg = "Không tìm thấy thiết bị ❌";
        } else if (e.name === "SecurityError") {
            msg = "Bluetooth bị chặn (HTTPS / permission) ❌";
        } else if (e.name === "NetworkError") {
            msg = "Lỗi kết nối BLE (device bận / out of range) ❌";
        } else if (e.message) {
            msg = e.message;
        }

        statusDiv.innerText = msg;
    }
}

document.getElementById("fileInput").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (file.size > 512 * 1024) {
        alert("File phải < 512KB");
        return;
    }

    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = () => {
        if (img.width !== 360 || img.height !== 360) {
            alert("Ảnh phải 360x360");
            return;
        }

        preview.innerHTML = `
            <div class="circle">
                <img src="${url}">
                <div class="radar" id="radar" style="display:none"></div>
            </div>
        `;

        const reader = new FileReader();
        reader.onload = (ev) => {
            fileBuffer = ev.target.result;
            statusDiv.innerText = "Ready ✅";
        };
        reader.readAsArrayBuffer(file);
    };

    img.src = url;
};

async function sendImage() {
    if (!characteristic || !fileBuffer) {
        statusDiv.innerText = "Not ready ❌";
        return;
    }

    const radar = document.getElementById("radar");
    if (radar) radar.style.display = "block";

    const size = fileBuffer.byteLength;

    try {
        const startMsg = new TextEncoder().encode(`IMG_START;${size}`);
        await characteristic.writeValue(startMsg);

        await delay(50);

        const chunkSize = 256;

        for (let i = 0; i < size; i += chunkSize) {
            const chunk = fileBuffer.slice(i, i + chunkSize);
            await characteristic.writeValue(chunk);

            const percent = Math.floor((i / size) * 100);
            bar.style.width = percent + "%";
            percentText.innerText = percent + "%";

            await delay(10);
        }

        const endMsg = new TextEncoder().encode("IMG_END");
        await characteristic.writeValue(endMsg);

        bar.style.width = "100%";
        percentText.innerText = "100%";

        statusDiv.innerText = "Done ✅";

    } catch (e) {
        statusDiv.innerText = "Send failed ❌";
        resetUI();
    }

    if (radar) radar.style.display = "none";
}

function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
}
</script>

</body>
</html>
