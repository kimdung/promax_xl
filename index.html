<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BLE Image Upload</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #111;
    color: #fff;
}

button {
    padding: 10px 20px;
    margin: 10px;
}

#preview {
    margin-top: 20px;
}

.circle {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    overflow: hidden;
    margin: auto;
    position: relative;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Radar */
.radar {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(rgba(0,255,0,0.4), transparent 60%);
    animation: sweep 2s linear infinite;
}

@keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.progress {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 20px auto;
    border-radius: 5px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: lime;
}
</style>
</head>

<body>

<h2>BLE Image Upload</h2>

<button onclick="connect()">Connect BLE</button>
<input type="file" id="fileInput" accept="image/jpeg">

<div id="preview"></div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div id="percent">0%</div>
<div id="status"></div>

<br>
<button onclick="sendImage()">Send Image</button>

<script>

let device, characteristic;
let fileBuffer = null;

const SERVICE_UUID = '0000fff0-0000-1000-8000-00805f9b34fb';
const WRITE_UUID   = '0000fff1-0000-1000-8000-00805f9b34fb';

const bar = document.getElementById("bar");
const percentText = document.getElementById("percent");
const statusDiv = document.getElementById("status");
const preview = document.getElementById("preview");

/* =========================
   UI RESET
========================= */

function resetUI(msg = "Disconnected") {
    bar.style.width = "0%";
    percentText.innerText = "0%";
    preview.innerHTML = "";
    fileBuffer = null;
    statusDiv.innerText = msg;

    device = null;
    characteristic = null;
}

/* =========================
   BLE CONNECT
========================= */

async function connect() {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Promax XL" }],
            optionalServices: [SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', () => {
            resetUI("Disconnected ❌");
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(WRITE_UUID);

        statusDiv.innerText = "Connected ✅";

    } catch (e) {
        statusDiv.innerText = "Connect failed ❌";
    }
}

/* =========================
   FILE SELECT
========================= */

document.getElementById("fileInput").onchange = (e) => {

    const file = e.target.files[0];
    if (!file) return;

    // RESET UI trạng thái
    bar.style.width = "0%";
    percentText.innerText = "0%";
    statusDiv.innerText = "Checking image...";
    fileBuffer = null;

    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = () => {

        // 🔥 CHECK 360x360
        if (img.width !== 360 || img.height !== 360) {
            alert("Ảnh phải đúng 360x360");
            preview.innerHTML = "";
            statusDiv.innerText = "Invalid size ❌";
            return;
        }

        // preview tròn
        preview.innerHTML = `
            <div class="circle">
                <img src="${url}">
                <div class="radar" id="radar" style="display:none;"></div>
            </div>
        `;

        const reader = new FileReader();
        reader.onload = (ev) => {
            fileBuffer = ev.target.result;
            statusDiv.innerText = "Ready ✅";
        };
        reader.readAsArrayBuffer(file);
    };

    img.src = url;
};

/* =========================
   SEND IMAGE
========================= */

async function sendImage() {

    if (!characteristic || !fileBuffer) {
        statusDiv.innerText = "Not ready ❌";
        return;
    }

    const radar = document.getElementById("radar");
    if (radar) radar.style.display = "block";

    const size = fileBuffer.byteLength;

    statusDiv.innerText = "Sending...";

    try {

        // START
        const startMsg = new TextEncoder().encode(`IMG_START;${size}`);
        await characteristic.writeValue(startMsg);

        await delay(50);

        // DATA
        const chunkSize = 128;

        for (let i = 0; i < size; i += chunkSize) {

            const chunk = fileBuffer.slice(i, i + chunkSize);
            await characteristic.writeValue(chunk);

            const percent = Math.floor((i / size) * 100);

            bar.style.width = percent + "%";
            percentText.innerText = percent + "%";

            await delay(10);
        }

        // END
        const endMsg = new TextEncoder().encode("IMG_END");
        await characteristic.writeValue(endMsg);

        bar.style.width = "100%";
        percentText.innerText = "100%";

        statusDiv.innerText = "Done ✅";

    } catch (e) {
        statusDiv.innerText = "Send failed ❌";
        resetUI("Disconnected ❌");
    }

    if (radar) radar.style.display = "none";
}

/* ========================= */

function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
